<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>训练场 · Socialfix</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg-0:#08081a;
  --primary:#7c3aed; --primary-2:#ec4899;
  --good:#06d6a0; --key:#ffd60a; --info:#38bdf8; --warm:#f97316;
  --text:#f5f5ff; --text-2:#c7c7e0; --text-3:#8b8bb0;
  --border:rgba(255,255,255,.08);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--bg-0);color:var(--text);font-family:'Inter','Noto Sans SC',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}

.bg{position:fixed;inset:0;z-index:-2;background:
  radial-gradient(1000px 700px at 20% 10%, rgba(124,58,237,.30), transparent 60%),
  radial-gradient(1000px 700px at 80% 90%, rgba(236,72,153,.24), transparent 60%),
  radial-gradient(700px 500px at 90% 20%, rgba(255,214,10,.14), transparent 60%),
  linear-gradient(180deg,#08081a,#03030c);}
.orbs{position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.5;animation:float 22s ease-in-out infinite}
.orb.o1{width:520px;height:520px;background:radial-gradient(circle,#7c3aed,transparent 65%);top:-140px;left:-120px}
.orb.o2{width:460px;height:460px;background:radial-gradient(circle,#ec4899,transparent 65%);top:34%;right:-160px;animation-delay:-8s}
.orb.o3{width:380px;height:380px;background:radial-gradient(circle,#ffd60a,transparent 65%);bottom:-120px;left:24%;animation-delay:-14s;opacity:.3}
@keyframes float{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,-30px) scale(1.08)}}

nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:18px 40px;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(24px);background:rgba(8,8,26,.6);border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:10px;font-weight:900;font-size:18px;letter-spacing:-.02em;text-decoration:none;color:inherit}
.logo-dot{width:12px;height:12px;background:linear-gradient(135deg,var(--primary),var(--primary-2));border-radius:50%;box-shadow:0 0 20px rgba(236,72,153,.7);animation:pulse 2.5s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
.nav-links{display:flex;gap:20px;align-items:center;font-size:14px}
.nav-links a{color:var(--text-2);text-decoration:none;transition:.2s}
.back-link{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--text-3);text-decoration:none}
.back-link:hover{color:#fff}

/* Header */
.header{padding:130px 40px 20px;text-align:center;max-width:900px;margin:0 auto}
.chip{display:inline-flex;align-items:center;gap:8px;padding:8px 18px;border-radius:999px;background:rgba(255,214,10,.12);border:1px solid rgba(255,214,10,.35);color:var(--key);font-size:12px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;margin-bottom:22px;backdrop-filter:blur(10px)}
.chip::before{content:"";width:6px;height:6px;background:var(--key);border-radius:50%;box-shadow:0 0 12px var(--key)}
.header h1{font-size:clamp(56px,10vw,140px);font-weight:900;letter-spacing:-.04em;line-height:.9;background:linear-gradient(135deg,#fff 0%,var(--primary-2) 50%,var(--key));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:16px;text-shadow:0 0 80px rgba(236,72,153,.2)}
.header p{font-size:17px;color:var(--text-2);line-height:1.7;max-width:640px;margin:0 auto}
.header p b{color:#fff;font-weight:700}

/* Card container */
.wrap{max-width:820px;margin:40px auto 0;padding:0 24px 80px}

/* Filter bar */
.filters{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:30px}
.filter{padding:8px 16px;border-radius:999px;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text-2);font-size:13px;font-weight:600;cursor:pointer;transition:.2s;font-family:inherit}
.filter:hover{background:rgba(255,255,255,.08);color:#fff}
.filter.active{background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff;border-color:transparent;box-shadow:0 8px 20px rgba(124,58,237,.4)}

/* Scenario card */
.arena{position:relative;padding:36px;border-radius:28px;background:linear-gradient(160deg,rgba(255,255,255,.05),rgba(255,255,255,.01));border:1px solid var(--border);backdrop-filter:blur(20px);overflow:hidden;min-height:400px}
.arena::before{content:"";position:absolute;top:-40%;right:-40%;width:70%;height:70%;background:radial-gradient(circle,var(--primary-2),transparent 65%);filter:blur(60px);opacity:.25;pointer-events:none}
.arena > *{position:relative;z-index:1}

.arena-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.arena-tag{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:999px;font-size:11px;font-weight:800;letter-spacing:.05em}
.arena-tag.study{background:rgba(56,189,248,.15);color:#7dd3fc;border:1px solid rgba(56,189,248,.35)}
.arena-tag.family{background:rgba(236,72,153,.15);color:#f9a8d4;border:1px solid rgba(236,72,153,.35)}
.arena-tag.life{background:rgba(6,214,160,.15);color:#6ee7b7;border:1px solid rgba(6,214,160,.35)}
.arena-count{font-family:monospace;font-size:11px;color:var(--text-3);letter-spacing:.15em}

.arena-title{font-size:26px;font-weight:900;letter-spacing:-.02em;margin-bottom:14px;line-height:1.2}
.arena-scene{padding:18px 22px;background:rgba(56,189,248,.06);border-left:3px solid var(--info);border-radius:0 12px 12px 0;font-size:15px;line-height:1.75;color:var(--text-2);margin-bottom:14px}
.arena-quote{padding-left:14px;border-left:2px dashed rgba(236,72,153,.4);font-style:italic;color:var(--primary-2);font-size:15px;line-height:1.7;margin-bottom:26px}

/* Choices */
.choices-label{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text-3);letter-spacing:.2em;text-transform:uppercase;margin-bottom:14px;font-weight:700}
.choices-label::before{content:"";width:24px;height:1px;background:var(--text-3)}
.choices{display:flex;flex-direction:column;gap:12px}
.choice{padding:18px 22px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:16px;cursor:pointer;transition:.25s;text-align:left;font-family:inherit;font-size:15px;line-height:1.6;color:var(--text);position:relative;overflow:hidden}
.choice:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.2);transform:translateX(4px)}
.choice-letter{display:inline-block;width:26px;height:26px;border-radius:8px;background:rgba(255,255,255,.08);color:var(--text-2);font-weight:900;font-size:13px;text-align:center;line-height:26px;margin-right:12px;flex-shrink:0;transition:.25s}
.choice:hover .choice-letter{background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff}
.choice.disabled{pointer-events:none;opacity:.55}

/* Feedback */
.feedback{margin-top:26px;padding:24px;border-radius:20px;border:1px solid var(--border);background:rgba(255,255,255,.03);animation:fadeIn .35s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.feedback-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.feedback-icon{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;font-size:22px;flex-shrink:0}
.feedback-label{font-size:11px;color:var(--text-3);letter-spacing:.15em;text-transform:uppercase;font-weight:700;margin-bottom:2px}
.feedback-title{font-size:18px;font-weight:900;letter-spacing:-.01em}

.feedback.good .feedback-icon{background:linear-gradient(135deg,var(--good),var(--info))}
.feedback.good .feedback-title{color:#a3f5cf}
.feedback.mid .feedback-icon{background:linear-gradient(135deg,var(--key),var(--warm));color:#0a0a1f}
.feedback.mid .feedback-title{color:var(--key)}
.feedback.bad .feedback-icon{background:linear-gradient(135deg,#ef4444,var(--warm))}
.feedback.bad .feedback-title{color:#fca5a5}

.feedback-body{font-size:14.5px;color:var(--text-2);line-height:1.85;margin-bottom:16px}
.feedback-body b{color:#fff;font-weight:700}
.feedback-tip{padding:14px 16px;background:rgba(255,214,10,.08);border:1px dashed rgba(255,214,10,.3);border-radius:12px;font-size:13px;color:var(--text-2);line-height:1.7;display:flex;gap:12px}
.feedback-tip::before{content:"💡";font-size:18px;flex-shrink:0}

/* Bottom actions */
.arena-actions{display:flex;gap:12px;margin-top:26px;flex-wrap:wrap}
.btn{padding:14px 24px;border-radius:14px;font-size:14px;font-weight:800;text-decoration:none;transition:.25s;display:inline-flex;align-items:center;gap:8px;cursor:pointer;border:none;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff;box-shadow:0 12px 30px rgba(124,58,237,.4);flex:1;justify-content:center;font-size:15px}
.btn-primary:hover{transform:translateY(-3px);box-shadow:0 18px 40px rgba(124,58,237,.55)}
.btn-ghost{background:rgba(255,255,255,.05);color:var(--text-2);border:1px solid var(--border)}
.btn-ghost:hover{background:rgba(255,255,255,.1);color:#fff}

/* How-to strip */
.howto{margin:60px auto 0;max-width:820px;padding:24px 28px;border-radius:20px;background:linear-gradient(135deg,rgba(6,214,160,.08),rgba(56,189,248,.08));border:1px solid rgba(6,214,160,.15);display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.howto-emo{font-size:40px;flex-shrink:0}
.howto-body h4{font-size:16px;font-weight:900;margin-bottom:6px}
.howto-body p{font-size:13.5px;color:var(--text-2);line-height:1.7}
.howto-body b{color:#fff}

footer{padding:80px 40px 40px;text-align:center;border-top:1px solid var(--border);margin-top:80px}
.foot-text{color:var(--text-3);font-size:13px}

@media (max-width:700px){
  nav{padding:14px 16px}
  .nav-links a:not(.back-link){display:none}
  .header{padding:110px 20px 20px}
  .wrap{padding:0 16px 60px}
  .arena{padding:24px}
  .arena-title{font-size:22px}
}
</style>
</head>
<body>
<div class="bg"></div>
<div class="orbs">
  <div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>
</div>

<nav>
  <a class="logo" href="index.html"><span class="logo-dot"></span>Socialfix</a>
  <div class="nav-links">
    <a class="back-link" href="index.html">← 回到首页</a>
  </div>
</nav>

<div class="header">
  <div class="chip">✦ Training Ground · No Score</div>
  <h1>训练场</h1>
  <p>抽一个场景，试一次你的反应。这里<b>不看分数、不打卡、不排名</b>——只是给你一个纯练手的空间。选一个答案，看看会发生什么，然后再抽下一个。</p>
</div>

<div class="wrap">
  <div class="filters" id="filters">
    <button class="filter active" data-filter="all">全部场景</button>
    <button class="filter" data-filter="study">🎓 学习</button>
    <button class="filter" data-filter="family">🏠 家庭</button>
    <button class="filter" data-filter="life">🌆 生活</button>
  </div>

  <div class="arena" id="arena">
    <div class="arena-top">
      <span class="arena-tag" id="arenaTag">场景</span>
      <span class="arena-count" id="arenaCount">SCENE -- / --</span>
    </div>
    <h2 class="arena-title" id="arenaTitle">加载中…</h2>
    <div class="arena-scene" id="arenaScene"></div>
    <div class="arena-quote" id="arenaQuote"></div>

    <div class="choices-label">你会怎么回？</div>
    <div class="choices" id="choices"></div>

    <div id="feedbackWrap"></div>

    <div class="arena-actions">
      <button class="btn btn-primary" id="nextBtn">🎲 换一个场景</button>
      <a class="btn btn-ghost" href="index.html">回到首页</a>
    </div>
  </div>

  <div class="howto">
    <div class="howto-emo">🕊</div>
    <div class="howto-body">
      <h4>这里没有对错，只有练习</h4>
      <p>每个选项都会给你一段<b>正向的反馈</b>——就算选了不理想的答案，也不会说你"错"，只会告诉你在真实场景里会发生什么、下次可以怎么调整。<b>把它当成一个安全的沙盒</b>，反复练，直到那句话变成你的本能。</p>
    </div>
  </div>
</div>

<footer><div class="foot-text">Socialfix · 训练场 · 一次只练一句话</div></footer>

<script>
/* ===== Training scenarios (no scoring) ===== */
const SCENES = [
  {
    cat:'study', tag:'🎓 学习场景',
    title:'被同学当众开你玩笑',
    scene:'下课时同学当着一群人的面拿你过去的糗事开玩笑，你能感觉到笑声里有点不对劲。',
    quote:'「哈哈哈还是那次最经典！他脸都绿了。」',
    choices:[
      { text:'笑着说「过去了过去了，别再翻旧账 😂」，然后自然换话题。',
        kind:'good',
        head:'很稳的回应',
        body:'你用<b>轻松的口气划出了边界</b>——参与但不接梗。这样既没有让气氛变尴尬，又清楚地告诉了对方"这个话题到此为止"。多数朋友到这里就会自然收手。',
        tip:'加分动作：说完之后主动把话题引向别的事情（比如"对了你说下午那个……"），别的朋友会顺势跟着走。'
      },
      { text:'跟着自嘲得更狠，反正大家开心就行。',
        kind:'mid',
        head:'心里其实有点憋',
        body:'表面上你合群了，但你自己会更不舒服。<b>长期这样，朋友会习惯性地把你当"梗"</b>——你在他们心里的位置会一点点下滑。合群不用靠贬低自己。',
        tip:'下次试试："这个梗我也听腻了 😂 来说点新的。" 一样轻松，但保住了尊严。'
      },
      { text:'冷下脸："哪次不比你强！" 直接回击。',
        kind:'bad',
        head:'火气可以理解，但代价大',
        body:'你反击的当下爽，但<b>会把玩笑变成对立</b>。旁边的人不会觉得你「维护自尊」，只会觉得"XX 突然翻脸了"。你要的其实是尊重，不是赢。',
        tip:'情绪上来时先深呼吸一下，用「过去了过去了」代替反击——一样能停下话题，还不留伤。'
      },
      { text:'一言不发，等这场笑话过去。',
        kind:'mid',
        head:'沉默是一种回答，但不是最好的',
        body:'你的不适没有被表达，<b>下次同样的情景还会出现</b>。而且旁人可能理解成"他不在意"，玩笑会继续升级。你有权说"不"。',
        tip:'哪怕只是一句"OK 我知道你们觉得好笑"就够——让人感觉到你有情绪，就够了。'
      },
    ],
  },
  {
    cat:'family', tag:'🏠 家庭场景',
    title:'爸妈翻你手机',
    scene:'放学回家，你看到妈妈拿着你手机，一脸严肃地看着你。',
    quote:'「你在跟谁聊天？为什么删记录？」',
    choices:[
      { text:'先坐下，深呼吸："你是不是担心我遇到什么事？"',
        kind:'good',
        head:'高手',
        body:'你没有被字面激怒，而是<b>翻译了她真正的情绪</b>——担心。这一句会让她的火瞬间小一半，因为她感觉到自己被理解了。接下来任何谈判都会更顺利。',
        tip:'翻译情绪 + 稳定语气 + 后续的边界要求，这套组合能解决 80% 的家庭冲突。'
      },
      { text:'"你凭什么翻我东西！" 直接开吵。',
        kind:'bad',
        head:'情绪很真实，但结果会更糟',
        body:'你越激烈，她越觉得"看来真有问题"。<b>攻击换来更多防御</b>——她下次可能会更频繁地检查你。你的边界不会因为吵得响就被尊重。',
        tip:'先承认她的情绪（担心），再谈你的诉求（隐私）。顺序错了，谁都没赢。'
      },
      { text:'"随便你看啊，我没什么好隐瞒的。" 装大度。',
        kind:'mid',
        head:'表面赢了，实际上让步了',
        body:'你把隐私的边界让了出去。<b>爸妈会记住"翻手机他都不反对"</b>，下次继续。而你心里会积累一层层不舒服，早晚会在别的事情上爆发。',
        tip:'该保护的边界要保护——但用温柔的方式。比如"你可以问我聊了谁，我告诉你，但手机是我的"。'
      },
      { text:'当场哭出来，摔门进房间。',
        kind:'bad',
        head:'情绪爆发是正常的，但问题没解决',
        body:'摔门那一下你以为是宣告边界，妈妈接收到的是<b>"这孩子越来越叛逆"</b>。她的担心变成焦虑，下次可能变成更严厉的管控。你的情绪值得被处理，但不是这种方式。',
        tip:'如果真的很难受，可以说"我现在情绪不好，等一下我们再聊"，然后回房间。这句话本身就是很成熟的表达。'
      },
    ],
  },
  {
    cat:'life', tag:'🌆 生活场景',
    title:'心动的人已读不回',
    scene:'你今天鼓起勇气跟喜欢的人发了一段长消息，「已读」两个字挂了两个小时。',
    quote:'你不敢再看手机，又忍不住每隔两分钟刷一次。',
    choices:[
      { text:'放下手机去做别的事，心里对自己说「他可能在忙」。',
        kind:'good',
        head:'非常成熟的反应',
        body:'你没有把「未读」变成剧本。<b>已读不回 90% 的原因是「在忙 / 不知道怎么回」</b>，不是"不喜欢你"。给对方时间，也给自己空间——这才是可持续的心动。',
        tip:'很多美好的关系是靠"耐心"养出来的。你越松，越有魅力。'
      },
      { text:'再发一条「在吗？」看看他回不回。',
        kind:'mid',
        head:'焦虑可以理解，但操作会扣分',
        body:'"在吗？"是<b>关系里最没吸引力的三个字</b>——因为它把焦虑感直接甩给对方。就算他本想回，看到这条也会想逃一下。',
        tip:'真的想续话题的话，隔几个小时发一句和之前无关的、轻松的内容——比"在吗？"高级一百倍。'
      },
      { text:'翻朋友圈发一句阴阳文字，让他看看。',
        kind:'bad',
        head:'心里的委屈可以看到，但这不是出口',
        body:'他会看到，但看到的是"这个人有点难搞"。<b>阴阳的动作把你的心理活动全暴露了</b>，而暴露焦虑会让暗恋进入下坡通道。你的委屈很真实，但值得更好的出口。',
        tip:'难过的时候找朋友聊、写日记、出去走走——比朋友圈能真正让你舒服的事有很多。'
      },
      { text:'当天下午就在心里断言"他一定不喜欢我"。',
        kind:'mid',
        head:'内心戏太快下结论',
        body:'两小时不够定义任何关系。<b>你越早下"他不喜欢我"的结论，越容易做出退缩或攻击的举动</b>，反而真的把这段关系推走。事实往往比想象平淡。',
        tip:'给"证据"多一点耐心——三天没回、四条消息不回，这时候再判断也不迟。'
      },
    ],
  },
  {
    cat:'study', tag:'🎓 学习场景',
    title:'组员完全不动手',
    scene:'小组作业明晚就交，你已经写完了自己那部分，其他人的部分一片空白。',
    quote:'群里静得能听见回声。',
    choices:[
      { text:'私聊那个明显在摸鱼的组员："今晚 11 点前给我你那部分行吗？我等着合。"',

/* ===== State ===== */
let currentFilter = 'all';
let filtered = SCENES.slice();
let currentIdx = 0;
let answered = false;
let sessionRounds = [];
let lastSceneTitle = '';

/* Score mapping: kind → {empathy, boundary, build, calm} */
const SCORE_MAP = {
  good: { empathy:80, boundary:70, build:75, calm:85 },
  mid:  { empathy:48, boundary:42, build:42, calm:52 },
  bad:  { empathy:22, boundary:20, build:20, calm:28 }
};

function shuffleFrom(){
  filtered = SCENES.filter(s => currentFilter === 'all' || s.cat === currentFilter);
  // pick a random one (not necessarily the first)
  currentIdx = Math.floor(Math.random() * filtered.length);
}

function render(){
  const s = filtered[currentIdx];
  lastSceneTitle = s.title;
  const catNames = { study:'🎓 学习场景', family:'🏠 家庭场景', life:'🌆 生活场景' };
  const arenaTag = document.getElementById('arenaTag');
  arenaTag.textContent = catNames[s.cat] || s.tag;
  arenaTag.className = 'arena-tag ' + s.cat;
  document.getElementById('arenaCount').textContent = 'SCENE ' + String(currentIdx+1).padStart(2,'0') + ' / ' + String(filtered.length).padStart(2,'0');
  document.getElementById('arenaTitle').textContent = s.title;
  document.getElementById('arenaScene').textContent = s.scene;
  document.getElementById('arenaQuote').textContent = s.quote;

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  const letters = ['A','B','C','D'];
  s.choices.forEach(function(c, i){
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.innerHTML = '<span class="choice-letter">'+letters[i]+'</span>'+c.text;
    btn.addEventListener('click', function(){ showFeedback(i); });
    choicesEl.appendChild(btn);
  });

  document.getElementById('feedbackWrap').innerHTML = '';
  answered = false;
}

function showFeedback(idx){
  if(answered) return;
  answered = true;
  const s = filtered[currentIdx];
  const c = s.choices[idx];
  // disable others
  document.querySelectorAll('.choice').forEach(function(btn, i){
    if(i !== idx) btn.classList.add('disabled');
  });

  /* Record this round for result page */
  const sc = SCORE_MAP[c.kind] || SCORE_MAP.mid;
  const roundTotal = Math.round((sc.empathy + sc.boundary + sc.build + sc.calm) / 4);
  sessionRounds.push({
    text: c.text.replace(/<[^>]*>/g,'').replace(/&[^;]+;/g,'').substring(0,60),
    empathy: sc.empathy, boundary: sc.boundary, build: sc.build, calm: sc.calm,
    total: roundTotal
  });

  const icons = { good:'🌟', mid:'💭', bad:'⚠️' };
  const labels = { good:'非常好的选择', mid:'可以再想想', bad:'这样的话' };
  const fb = document.createElement('div');
  fb.className = 'feedback ' + c.kind;
  fb.innerHTML =
    '<div class="feedback-top">' +
      '<div class="feedback-icon">'+icons[c.kind]+'</div>' +
      '<div>' +
        '<div class="feedback-label">'+labels[c.kind]+'</div>' +
        '<div class="feedback-title">'+c.head+'</div>' +
      '</div>' +
    '</div>' +
    '<div class="feedback-body">'+c.body+'</div>' +
    '<div class="feedback-tip">'+c.tip+'</div>';

  /* Add "查看战报" button if at least 1 round recorded */
  if(sessionRounds.length >= 1){
    const viewBtn = document.createElement('a');
    viewBtn.className = 'btn btn-primary';
    viewBtn.style.marginTop = '16px';
    viewBtn.style.display = 'inline-flex';
    viewBtn.textContent = '📊 查看战报';
    viewBtn.addEventListener('click', function(){
      /* Compute averages */
      var n = sessionRounds.length;
      var avgEmp=0, avgBnd=0, avgBld=0, avgClm=0, avgTotal=0;
      sessionRounds.forEach(function(r){
        avgEmp += r.empathy; avgBnd += r.boundary;
        avgBld += r.build; avgClm += r.calm; avgTotal += r.total;
      });
      var data = {
        sceneTitle: lastSceneTitle,
        total: Math.round(avgTotal / n),
        empathy: Math.round(avgEmp / n),
        boundary: Math.round(avgBnd / n),
        build: Math.round(avgBld / n),
        calm: Math.round(avgClm / n),
        rounds: sessionRounds
      };
      try{ localStorage.setItem('sf_result', JSON.stringify(data)); }catch(e){}
      window.location.href = 'result.html';
    });
    fb.appendChild(viewBtn);
  }

  document.getElementById('feedbackWrap').appendChild(fb);
}

document.getElementById('nextBtn').addEventListener('click', function(){
  shuffleFrom();
  render();
  window.scrollTo({top:document.querySelector('.arena').offsetTop - 80, behavior:'smooth'});
});

document.querySelectorAll('.filter').forEach(function(btn){
  btn.addEventListener('click', function(){
    document.querySelectorAll('.filter').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    sessionRounds = [];
    shuffleFrom();
    render();
  });
});

// initial
shuffleFrom();
render();
